kind = "web"
previewPath = "/"
title = "FraudGuard SaaS"
version = "1.0.0"
id = "artifacts/fraudapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20878

[services.development]
run = "pnpm --filter @workspace/fraudapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fraudapp", "run", "build" ]
publicDir = "artifacts/fraudapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20878"
BASE_PATH = "/"
