<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin User - FraudGuard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #FF6B35; margin-bottom: 10px; }
        button {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        button:hover { background: #e55a2b; }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        .detail {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Create Admin User</h1>
        <p style="color: #666; margin-bottom: 20px;">Klik tombol di bawah untuk membuat admin user otomatis</p>

        <div class="info">
            <strong>📧 Email:</strong> <code>admin@fraudguard.id</code><br>
            <strong>🔑 Password:</strong> <code>admin123</code><br>
            <strong>👤 Role:</strong> System Admin
        </div>

        <button id="createBtn" onclick="createAdminUser()">
            🚀 Buat Admin User
        </button>

        <div id="status"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ouukyqpdmdkugrlickhj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dWt5cXBkbWRrdWdybGlja2hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NTYzMzQsImV4cCI6MjA4MDIzMjMzNH0.UbORcEsEpKj655KZ0tXWgjywF_XBbbikbQZszqLvkgE';
        const COMPANY_ID = 'cc62285d-a8e9-4ca6-8a8b-988785473b2a';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function createAdminUser() {
            const btn = document.getElementById('createBtn');
            const statusDiv = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = '⏳ Membuat user...';
            statusDiv.innerHTML = '<div class="loading">⏳ Sedang membuat admin user...</div>';

            try {
                // Step 1: Create Auth User
                statusDiv.innerHTML = '<div class="loading">📝 Step 1/3: Membuat auth user...</div>';

                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: 'admin@fraudguard.id',
                    password: 'admin123',
                    options: {
                        data: {
                            name: 'Super Admin',
                            role: 'System Admin',
                            company_id: COMPANY_ID
                        },
                        emailRedirectTo: undefined
                    }
                });

                if (authError) {
                    if (authError.message.includes('already registered')) {
                        statusDiv.innerHTML = `
                            <div class="info">
                                ℹ️ <strong>User sudah ada di auth.users</strong>
                                <div class="detail">Email <code>admin@fraudguard.id</code> sudah terdaftar. Mencoba membuat profile...</div>
                            </div>
                        `;

                        // Try to sign in to get user ID
                        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                            email: 'admin@fraudguard.id',
                            password: 'admin123'
                        });

                        if (!signInError && signInData.user) {
                            // Try to insert profile
                            await insertProfile(signInData.user.id, statusDiv);
                            return;
                        }
                    }
                    throw authError;
                }

                if (!authData.user) {
                    throw new Error('Gagal membuat user di auth.users');
                }

                statusDiv.innerHTML = `
                    <div class="success">
                        ✅ Step 1/3: Auth user berhasil dibuat
                        <div class="detail">User ID: <code>${authData.user.id}</code></div>
                    </div>
                `;

                // Step 2: Insert into users table
                await insertProfile(authData.user.id, statusDiv);

            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = `
                    <div class="error">
                        ❌ <strong>Error:</strong> ${error.message}
                        <div class="detail">
                            <strong>Solusi:</strong><br>
                            1. Buka Supabase Dashboard: <a href="https://supabase.com/dashboard/project/ouukyqpdmdkugrlickhj/settings/auth" target="_blank">Auth Settings</a><br>
                            2. Disable "Enable email confirmations"<br>
                            3. Coba lagi
                        </div>
                    </div>
                `;
                btn.disabled = false;
                btn.textContent = '🔄 Coba Lagi';
            }
        }

        async function insertProfile(userId, statusDiv) {
            statusDiv.innerHTML += '<div class="loading">📝 Step 2/3: Membuat user profile...</div>';

            const { error: profileError } = await supabase
                .from('users')
                .insert({
                    id: userId,
                    email: 'admin@fraudguard.id',
                    name: 'Super Admin',
                    role: 'System Admin',
                    company_id: COMPANY_ID,
                    avatar: 'https://ui-avatars.com/api/?background=0f172a&color=fff&name=Super+Admin'
                });

            if (profileError) {
                if (profileError.message.includes('duplicate key')) {
                    statusDiv.innerHTML = `
                        <div class="success">
                            ✅ <strong>User sudah lengkap!</strong>
                            <div class="detail">
                                User profile sudah ada di database.<br><br>
                                <strong>Login sekarang:</strong><br>
                                📧 Email: <code>admin@fraudguard.id</code><br>
                                🔑 Password: <code>admin123</code>
                            </div>
                        </div>
                    `;
                    document.getElementById('createBtn').textContent = '✅ User Sudah Siap!';
                    return;
                }
                throw profileError;
            }

            statusDiv.innerHTML = `
                <div class="success">
                    ✅ <strong>Berhasil!</strong>
                    <div class="detail">
                        Admin user berhasil dibuat lengkap.<br><br>
                        <strong>Login sekarang dengan:</strong><br>
                        📧 Email: <code>admin@fraudguard.id</code><br>
                        🔑 Password: <code>admin123</code><br>
                        👤 Role: System Admin
                    </div>
                </div>
            `;

            document.getElementById('createBtn').textContent = '✅ Selesai! Silakan Login';
        }
    </script>
</body>
</html>
