<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Functions Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .stage-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stage-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stage-item strong {
            display: block;
            color: #667eea;
            margin-bottom: 5px;
        }

        .timeline-entry {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #28a745;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Stage Functions Test Page</h1>

        <!-- Test Setup -->
        <div class="card">
            <h2>📋 Test Setup</h2>
            <div class="form-group">
                <label>Session ID:</label>
                <input type="text" id="sessionId" value="test-session-123" placeholder="Enter session ID">
            </div>
            <button onclick="createTestSession()">Create Test Session</button>
            <div id="setupResult" class="result"></div>
        </div>

        <!-- Update Stage -->
        <div class="card">
            <h2>🔄 Update Candidate Stage</h2>
            <div class="form-group">
                <label>Session ID:</label>
                <input type="text" id="updateSessionId" value="test-session-123">
            </div>
            <div class="form-group">
                <label>New Stage:</label>
                <select id="newStage">
                    <option value="applied">Applied</option>
                    <option value="integrity_assessment">Integrity Assessment</option>
                    <option value="assessment_completed">Assessment Completed</option>
                    <option value="interview">Interview</option>
                    <option value="background_check">Background Check</option>
                    <option value="bc_completed">BC Completed</option>
                    <option value="hired">Hired</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="form-group">
                <label>Note (optional):</label>
                <textarea id="stageNote" rows="3" placeholder="Add a note about this stage change..."></textarea>
            </div>
            <button onclick="updateStage()">Update Stage</button>
            <div id="updateResult" class="result"></div>
        </div>

        <!-- Get Stage Info -->
        <div class="card">
            <h2>📊 Get Stage Information</h2>
            <div class="form-group">
                <label>Session ID:</label>
                <input type="text" id="infoSessionId" value="test-session-123">
            </div>
            <button onclick="getStageInfo()">Get Stage Info</button>
            <div id="infoResult" class="result"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getFunctions, httpsCallable, connectFunctionsEmulator } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js';

        // Initialize Firebase with emulator
        const firebaseConfig = {
            projectId: 'gen-lang-client-0226679970',
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'europe-west1');

        // Connect to emulators
        connectFunctionsEmulator(functions, '127.0.0.1', 5001);

        // Make functions available globally
        window.db = db;
        window.functions = functions;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.serverTimestamp = serverTimestamp;
        window.httpsCallable = httpsCallable;

        console.log('✅ Firebase initialized with emulator');
    </script>

    <script>
        function showResult(elementId, success, message, data = null) {
            const resultDiv = document.getElementById(elementId);
            resultDiv.className = `result ${success ? 'success' : 'error'}`;
            resultDiv.style.display = 'block';
            
            let html = `<strong>${success ? '✅ Success' : '❌ Error'}:</strong> ${message}`;
            
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            resultDiv.innerHTML = html;
        }

        async function createTestSession() {
            const sessionId = document.getElementById('sessionId').value;
            
            if (!sessionId) {
                showResult('setupResult', false, 'Please enter a session ID');
                return;
            }

            try {
                const sessionRef = doc(db, 'interview_sessions', sessionId);
                
                await setDoc(sessionRef, {
                    sessionId: sessionId,
                    companyId: 'test-company-456',
                    candidate: {
                        name: 'John Doe',
                        email: 'john.doe@example.com'
                    },
                    recruitmentStage: 'applied',
                    status: 'pending',
                    timeline: [],
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });

                showResult('setupResult', true, `Test session created: ${sessionId}`);
                
                // Update other input fields
                document.getElementById('updateSessionId').value = sessionId;
                document.getElementById('infoSessionId').value = sessionId;
                
            } catch (error) {
                console.error('Error creating test session:', error);
                showResult('setupResult', false, error.message);
            }
        }

        async function updateStage() {
            const sessionId = document.getElementById('updateSessionId').value;
            const stage = document.getElementById('newStage').value;
            const note = document.getElementById('stageNote').value;

            if (!sessionId) {
                showResult('updateResult', false, 'Please enter a session ID');
                return;
            }

            try {
                const updateCandidateStage = httpsCallable(functions, 'updateCandidateStage');
                
                const result = await updateCandidateStage({
                    sessionId: sessionId,
                    stage: stage,
                    note: note || undefined
                });

                showResult('updateResult', true, 'Stage updated successfully', result.data);
                
            } catch (error) {
                console.error('Error updating stage:', error);
                showResult('updateResult', false, error.message, error);
            }
        }

        async function getStageInfo() {
            const sessionId = document.getElementById('infoSessionId').value;

            if (!sessionId) {
                showResult('infoResult', false, 'Please enter a session ID');
                return;
            }

            try {
                const getCandidateStageInfo = httpsCallable(functions, 'getCandidateStageInfo');
                
                const result = await getCandidateStageInfo({
                    sessionId: sessionId
                });

                // Format the result nicely
                const data = result.data;
                let html = `<strong>✅ Success:</strong> Stage information retrieved`;
                
                html += '<div class="stage-info">';
                html += `<div class="stage-item"><strong>Current Stage:</strong> ${data.currentStage}</div>`;
                html += `<div class="stage-item"><strong>Stage Label:</strong> ${data.stageLabel}</div>`;
                html += `<div class="stage-item"><strong>Progress:</strong> ${data.progress}%</div>`;
                html += '</div>';

                if (data.timeline && data.timeline.length > 0) {
                    html += '<h3 style="margin-top: 20px; color: #667eea;">Timeline:</h3>';
                    data.timeline.forEach(entry => {
                        html += `<div class="timeline-entry">
                            <strong>${entry.stage}</strong><br>
                            ${entry.note}<br>
                            <small>${new Date(entry.date).toLocaleString()}</small>
                        </div>`;
                    });
                }

                document.getElementById('infoResult').className = 'result success';
                document.getElementById('infoResult').style.display = 'block';
                document.getElementById('infoResult').innerHTML = html;
                
            } catch (error) {
                console.error('Error getting stage info:', error);
                showResult('infoResult', false, error.message, error);
            }
        }
    </script>
</body>
</html>
